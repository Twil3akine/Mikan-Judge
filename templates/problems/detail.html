{% extends "base.html" %}
{% block title %}{{ problem.title }} - MikanJudge{% endblock %}

{% block content %}
<div style="display:flex;gap:2rem;align-items:baseline;margin-bottom:.5rem">
  <h1>{{ problem.title }}</h1>
  <span style="color:var(--muted);font-size:.875rem">
    時間制限: {{ problem.time_limit_ms }} ms　／　メモリ制限: {{ problem.memory_limit_kb | filesizeformat }}
  </span>
</div>

<div class="card statement">
  {{ problem.html_content | safe }}
</div>

<div class="card">
  <h2 style="margin-top:0">提出</h2>
  <form method="POST" action="/problems/{{ problem.id }}/submit">
    <div class="form-group">
      <label for="language">言語</label>
      <select name="language" id="language">
        <option value="cpp">C++17</option>
        <option value="rust">Rust</option>
      </select>
    </div>
    <div class="form-group">
      <label for="source_code">ソースコード</label>
      <textarea name="source_code" id="source_code" placeholder="// ここにコードを貼り付けてください" required></textarea>
    </div>
    <button type="submit" class="btn">提出する</button>
  </form>
</div>
{% endblock %}
