<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}MikanJudge{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
  <!-- KaTeX -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"
    onload="renderMathInElement(document.body, {delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}]})">
  </script>
  <!-- highlight.js -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script>
  hljs.configure({ ignoreUnescapedHTML: true });
  document.addEventListener('DOMContentLoaded', () => {
    document.querySelectorAll('pre code').forEach(el => {
      if (!el.closest('.statement')) hljs.highlightElement(el);
    });
  });</script>
  <!-- htmx -->
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body>
  <nav>
    <a class="logo" href="/">🍊 MikanJudge</a>
    {% if contest_id %}
    <a href="/contests/{{ contest_id }}/problems">問題一覧</a>
    <a href="/contests/{{ contest_id }}/submissions">提出一覧</a>
    <a href="/contests/{{ contest_id }}/standings">順位表</a>
    <a href="/languages">提出言語</a>
    {% else %}
    <a href="/contests">コンテスト一覧</a>
    <a href="/languages">提出言語</a>
    {% endif %}
    <span style="flex:1"></span>
    {% if current_user %}
    <span style="color:var(--muted);font-size:.875rem">{{ current_user }}</span>
    <a href="/settings" style="font-size:.875rem">設定</a>
    <form method="POST" action="/logout" style="margin:0">
      <button type="submit" class="btn" style="padding:.6rem .75rem;font-size:.8rem">ログアウト</button>
    </form>
    {% else %}
    <a href="/login">ログイン</a>
    <a href="/register">新規登録</a>
    {% endif %}
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
  {% block scripts %}{% endblock %}
</body>
</html>
