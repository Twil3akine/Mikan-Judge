{% extends "base.html" %}
{% block title %}新規登録 | MikanJudge{% endblock %}

{% block content %}
<div style="max-width:360px;margin:4rem auto">
  <h1>新規登録</h1>
  <div class="card">
    {% if error %}
    <p style="color:var(--re);margin-top:0">{{ error }}</p>
    {% endif %}
    <form method="POST" action="/register">
      <div class="form-group">
        <label for="username">ユーザ名 <small style="color:var(--muted)">(3〜20文字)</small></label>
        <input type="text" name="username" id="username" required autocomplete="username"
               minlength="3" maxlength="20">
      </div>
      <div class="form-group">
        <label for="password">パスワード <small style="color:var(--muted)">(6文字以上)</small></label>
        <input type="password" name="password" id="password" required autocomplete="new-password"
               minlength="6">
      </div>
      <button type="submit" class="btn" style="width:100%">登録する</button>
    </form>
    <p style="margin-top:1rem;text-align:center;color:var(--muted)">
      すでにアカウントをお持ちの方は <a href="/login">ログイン</a>
    </p>
  </div>
</div>
{% endblock %}
