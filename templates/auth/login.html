{% extends "base.html" %}
{% block title %}ログイン | MikanJudge{% endblock %}

{% block content %}
<div style="max-width:360px;margin:4rem auto">
  <h1>ログイン</h1>
  <div class="card">
    {% if error %}
    <p style="color:var(--re);margin-top:0">{{ error }}</p>
    {% endif %}
    <form method="POST" action="/login">
      <div class="form-group">
        <label for="username">ユーザ名</label>
        <input type="text" name="username" id="username" required autocomplete="username">
      </div>
      <div class="form-group">
        <label for="password">パスワード</label>
        <input type="password" name="password" id="password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn" style="width:100%">ログイン</button>
    </form>
    <p style="margin-top:1rem;text-align:center;color:var(--muted)">
      アカウントをお持ちでない方は <a href="/register">新規登録</a>
    </p>
  </div>
</div>
{% endblock %}
