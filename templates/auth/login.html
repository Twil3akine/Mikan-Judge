{% extends "base.html" %}
{% block title %}ログイン | MikanJudge{% endblock %}

{% block content %}
<div style="max-width:380px;margin:4rem auto">
  <div style="text-align:center;margin-bottom:1.5rem">
    <div style="font-size:2.5rem">🍊</div>
    <h1 style="margin-bottom:.25rem">ログイン</h1>
    <p style="color:var(--muted);font-size:.9rem">MikanJudgeへようこそ</p>
  </div>
  <div class="card" style="padding:2rem">
    {% if error %}
    <div style="background:#fee2e2;border:1px solid #fecaca;border-radius:var(--radius);padding:.75rem 1rem;margin-bottom:1rem;color:var(--wa);font-size:.9rem">
      {{ error }}
    </div>
    {% endif %}
    <form method="POST" action="/login">
      <div class="form-group">
        <label for="username">ユーザ名</label>
        <input type="text" name="username" id="username" required autocomplete="username" placeholder="username">
      </div>
      <div class="form-group" style="margin-bottom:1.5rem">
        <label for="password">パスワード</label>
        <input type="password" name="password" id="password" required autocomplete="current-password" placeholder="••••••••">
      </div>
      <button type="submit" class="btn" style="width:100%;padding:.75rem">ログイン</button>
    </form>
    <p style="margin-top:1.25rem;text-align:center;color:var(--muted);font-size:.875rem">
      アカウントをお持ちでない方は <a href="/register">新規登録</a>
    </p>
  </div>
</div>
{% endblock %}
